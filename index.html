<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f4f0e8;min-height:100vh}
.header{background:linear-gradient(135deg,#5a3e1b,#8b6914);color:#fff;padding:12px 16px}
.header h1{font-size:17px;font-weight:900}
.header p{font-size:10px;opacity:.8}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e8e2d8;position:sticky;top:0;z-index:10;overflow-x:auto}
.tabs button{flex:1;min-width:70px;padding:10px 0;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;background:#fff;color:#aaa;border-bottom:3px solid transparent;white-space:nowrap}
.tabs button.active{background:#faf8f4;color:#5a3e1b;border-bottom-color:#8b6914}
.edit-area{padding:12px 14px 80px}
.edit-area h3{font-size:14px;font-weight:900;color:#5a3e1b;margin:14px 0 6px;border-bottom:2px solid #d4a05340;padding-bottom:4px}
.edit-area input,.edit-area textarea{width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:15px;box-sizing:border-box;font-family:inherit}
.row{display:flex;gap:6px;margin-top:6px}
.card{background:#faf8f4;border:1px solid #e8e2d8;border-radius:8px;padding:8px;margin-bottom:6px}
.card .top{display:flex;gap:6px;margin-bottom:4px}
.card .emojis{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.card .emojis button{font-size:16px;background:none;border:1px solid #e8e2d8;border-radius:4px;width:28px;height:28px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center}
.card .emojis button.sel{background:#f0e6d0;border:2px solid #8b6914}
.card .bottom{display:flex;gap:6px}
.del-btn{background:#e74c3c;color:#fff;border:none;border-radius:6px;width:36px;height:36px;font-size:18px;cursor:pointer;flex-shrink:0}
.add-btn{border:none;border-radius:6px;padding:8px 0;width:100%;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;color:#fff}
.ep{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0 6px}
.ep button{font-size:20px;background:none;border:1px solid #e8e2d8;border-radius:6px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.save-area{padding:16px}
.save-area .box{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.save-area .box h3{font-size:15px;font-weight:900;color:#5a3e1b;margin-bottom:8px}
.save-area .box p{font-size:12px;color:#888;margin-bottom:10px}
.save-btn{background:#27ae60;color:#fff;border:none;border-radius:8px;padding:14px 0;width:100%;font-size:15px;font-weight:700;cursor:pointer}
.load-label{display:block;text-align:center;background:#3498db;color:#fff;border-radius:8px;padding:14px 0;font-size:15px;font-weight:700;cursor:pointer}
.guide{background:#fef9e7;border-radius:10px;padding:14px;border:1px solid #f0d78c}
.guide h3{font-size:13px;font-weight:900;color:#8b6914}
.guide p{font-size:13px;color:#6b4c2a;line-height:2.2;margin-top:6px}
.preview-area{padding:8px;overflow-x:auto}
.preview-area .hint{font-size:11px;color:#888;text-align:center;margin-bottom:6px}
.auto-saved{background:#e8f5e9;color:#2e7d32;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;margin-bottom:8px}
</style>

for(var c=0;c<cats.length;c++){var cat=cats[c];for(var i=0;i<D[cat].length;i++){var el2;el2=document.getElementById(cat+’*e*’+i);if(el2)D[cat][i].e=el2.value;el2=document.getElementById(cat+’*n*’+i);if(el2)D[cat][i].n=el2.value;el2=document.getElementById(cat+’*u*’+i);if(el2)D[cat][i].u=el2.value;el2=document.getElementById(cat+’*p*’+i);if(el2)D[cat][i].p=el2.value}}
autoSave()}

function pickEmoji(prefix,em){if(prefix===‘feat’)D.feat.emoji=em;else if(prefix===‘sp’)D.special.emoji=em;autoSave()}
function pickItemEmoji(cat,idx,em){D[cat][idx].e=em;autoSave();render()}
function delItem(cat,idx){upd();D[cat].splice(idx,1);autoSave();render()}
function addItem(cat){upd();var max=cat===‘veg’?MAX_VEG:cat===‘fruit’?MAX_FRUIT:MAX_CITRUS;if(D[cat].length>=max){alert(‘最大’+max+‘品までです’);return}var de=cat===‘veg’?‘🥬’:cat===‘fruit’?‘🍎’:‘🍊’;D[cat].push({e:de,n:’’,u:’’,p:’’});autoSave();render()}

function doPrint(){var w=window.open(’’,’_blank’);if(!w){alert(‘ポップアップが許可されていません。設定を確認してください’);return}w.document.write(’<html><head><title>チラシ印刷</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Klee+One:wght@400;600&display=swap" rel="stylesheet"><style>@page{size:A4 landscape;margin:0}body{margin:0}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.page{page-break-after:always}</style></head><body><div class="page">’+buildInfoFlyer()+’</div><div class="page">’+buildMenuFlyer()+’</div></body></html>’);w.document.close();setTimeout(function(){w.print()},800)}

function saveJSON(){upd();var t=JSON.stringify(D,null,2);var w=window.open(’’,’_blank’);if(!w){alert(‘ポップアップを許可してください’);return}w.document.write(’<!DOCTYPE html><html><head><meta charset="UTF-8"><title>チラシデータ</title><style>body{font-family:monospace;padding:20px;background:#f5f5f5;margin:0}textarea{width:100%;height:70vh;font-size:12px;padding:10px;border:2px solid #8b6914;border-radius:8px;box-sizing:border-box}button{background:#27ae60;color:#fff;border:none;padding:12px 20px;font-size:16px;border-radius:8px;margin:10px 0;cursor:pointer;font-weight:700}.note{background:#fef9e7;padding:12px;border-radius:8px;margin-bottom:10px;font-family:sans-serif}</style></head><body><div class="note">📋 下のテキストを全選択してコピーし、メモアプリ等に貼り付けて保存してください</div><button onclick="var t=document.querySelector(\'textarea\');t.select();document.execCommand(\'copy\');alert(\'コピーしました！\')">📋 全部コピー</button><textarea readonly>’+t.replace(/</g,’<’)+’</textarea></body></html>’);w.document.close()}

function loadJSON(ev){var f=ev.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{D=JSON.parse(e.target.result);autoSave();render();alert(‘読み込み完了！’)}catch(x){alert(‘読み込めませんでした’)}};r.readAsText(f)}

function loadImage(ev,key){var f=ev.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){D[key]=e.target.result;autoSave();render();alert(‘画像を設定しました！’)};r.readAsDataURL(f)}

function clearImages(){if(confirm(‘画像をデフォルトに戻しますか？’)){D.imgQR=’’;D.imgMap=’’;autoSave();render()}}

function resetData(){if(confirm(‘本当に初期データに戻しますか？’)){D=JSON.parse(JSON.stringify(DEFAULT_D));autoSave();render()}}

try{render()}catch(e){document.getElementById(‘content’).innerHTML=’<div style="color:red;padding:20px">エラー: ‘+e.message+’</div>’}
